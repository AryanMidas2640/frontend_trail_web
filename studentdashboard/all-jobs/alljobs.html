<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>All Jobs</title>

    <link rel="stylesheet" href="alljobs.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="header">

        <div>

            <h1>All Available Jobs</h1>

            <p>Browse and explore the latest job opportunities.</p>

        </div>

        <button class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back to Dashboard

        </button>

    </div>


    <!-- Search & Filter -->

    <div class="filter-section">

        <div class="search-box">

            <i class="fa-solid fa-search"></i>

            <input
                type="text"
                id="searchJob"
                placeholder="Search by Job Title...">

        </div>

        <select id="companyFilter">

            <option>All Companies</option>

        </select>

        <select id="locationFilter">

            <option>All Locations</option>

        </select>

        <select id="typeFilter">

            <option>Job Type</option>

        </select>

    </div>


    <!-- Stats -->

    <div class="stats">

        <div class="stat-card">

            <h2 id="totalJobs">

                0

            </h2>

            <p>Total Jobs</p>

        </div>

        <div class="stat-card">

            <h2 id="activeJobs">

                0

            </h2>

            <p>Active Jobs</p>

        </div>

        <div class="stat-card">

            <h2 id="companies">

                0

            </h2>

            <p>Companies</p>

        </div>

    </div>


    <!-- Jobs Table -->

    <div class="table-card">

        <div class="table-header">

            <h2>

                Job Listings

            </h2>

        </div>

        <table>

            <thead>

                <tr>

                    <th>Job ID</th>

                    <th>Job Title</th>

                    <th>Company</th>

                    <th>Location</th>

                    <th>Salary</th>

                    <th>Job Type</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="jobsTable">

                <!-- Dynamic Data -->

            </tbody>

        </table>

    </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/alljobs.js"></script>


</body>

</html>
