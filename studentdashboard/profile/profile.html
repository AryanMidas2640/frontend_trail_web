<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Profile</title>

    <link rel="stylesheet" href="profile.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="profile-container">

    <!-- ================= HEADER ================= -->

    <div class="profile-header">

        <div class="profile-image">

            <img src="../images/profile.png"
                 id="profileImage"
                 alt="Profile">

        </div>

        <div class="profile-info">

            <h1 id="fullName">Student Name</h1>

            <p id="studentRole">
                <i class="fa-solid fa-user-graduate"></i>
                Student
            </p>

            <button class="edit-btn" id="editProfileBtn">
                <i class="fa-solid fa-pen"></i>
                Edit Profile
            </button>

            <button class="setting-btn" id="settingBtn">
    <i class="fa-solid fa-gear"></i>
    Settings
</button>

        </div>

    </div>

    <!-- ================= BASIC INFO ================= -->

    <div class="card">

        <div class="card-title">

            <i class="fa-solid fa-user"></i>

            <h2>Basic Information</h2>

        </div>

        <div class="profile-grid">

            <div class="profile-item">

                <label>Username</label>

                <input type="text"
                       id="username"
                       readonly>

            </div>

            <div class="profile-item">

                <label>Email</label>

                <input type="email"
                       id="email"
                       readonly>

            </div>

            <div class="profile-item">

                <label>Student ID</label>

                <input type="text"
                       id="studentId"
                       readonly>

            </div>

            <div class="profile-item">

                <label>Course</label>

                <input type="text"
                       id="course">

            </div>

            <div class="profile-item">

                <label>College</label>

                <input type="text"
                       id="college">

            </div>

            <div class="profile-item">

                <label>Phone</label>

                <input type="text"
                       id="phone">

            </div>

            <div class="profile-item">

                <label>Date of Birth</label>

                <input type="date"
                       id="dob">

            </div>

            <div class="profile-item">

                <label>Gender</label>

                <select id="gender">

                    <option>Male</option>

                    <option>Female</option>

                    <option>Other</option>

                </select>

            </div>

        </div>

    </div>

    <!-- ================= ADDRESS ================= -->

    <div class="card">

        <div class="card-title">

            <i class="fa-solid fa-location-dot"></i>

            <h2>Address</h2>

        </div>

        <textarea id="address"
                  rows="4"
                  placeholder="Enter Address"></textarea>

    </div>

    <!-- ================= SKILLS ================= -->

    <div class="card">

        <div class="card-title">

            <i class="fa-solid fa-code"></i>

            <h2>Skills</h2>

        </div>

        <textarea id="skills"
                  rows="4"
                  placeholder="Java, Spring Boot, HTML, CSS..."></textarea>

    </div>

    <!-- ================= ACCOUNT ================= -->

    <div class="card">

        <div class="card-title">

            <i class="fa-solid fa-shield-halved"></i>

            <h2>Account Information</h2>

        </div>

        <div class="profile-grid">

            <div class="profile-item">

                <label>Resume Status</label>

                <input type="text"
                       id="resumeStatus"
                       readonly>

            </div>

            <div class="profile-item">

                <label>Account Status</label>

                <input type="text"
                       id="accountStatus"
                       readonly>

            </div>

            <div class="profile-item">

                <label>Last Login</label>

                <input type="text"
                       id="lastLogin"
                       readonly>

            </div>

        </div>

    </div>

    <!-- ================= BUTTON ================= -->

    <div class="button-section">

        <button class="save-btn"
                id="saveProfileBtn">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Changes

        </button>

    </div>

</div>

<script src="../js/profile.js"></script>

</body>

</html>
