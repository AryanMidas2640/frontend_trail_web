<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recruiters List</title>

    <link rel="stylesheet" href="recruiter.css">

</head>

<body>

    <div class="recruiters-container">

        <div class="table-header">

            <h2>Recruiters List</h2>

            <input
                type="text"
                id="recruiterSearch"
                placeholder="Search by username..."
            >

        </div>

        <div class="table-responsive">

            <table id="recruitersTable">

                <thead>

                    <tr>

                        <th>#</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Tenant ID</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th>Last Logout</th>

                    </tr>

                </thead>

                <tbody id="recruitersBody">

                    <!-- Recruiters Data -->

                </tbody>

            </table>

        </div>

    </div>

    <script src="recruiter.js"></script>

</body>

</html>
