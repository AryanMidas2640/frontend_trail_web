<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings</title>

    <link rel="stylesheet" href="setting.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="settings-container">

    <!-- ================= HEADER ================= -->

    <div class="page-header">
        <h1><i class="fa-solid fa-gear"></i> Settings</h1>
        <p>Manage your account settings and security.</p>
    </div>

    <!-- ================= PROFILE ================= -->

    <div class="card">

        <div class="card-title">
            <i class="fa-solid fa-user"></i>
            <h2>Profile Information</h2>
        </div>

        <div class="form-grid">

            <div class="input-group">
                <label>Username</label>
                <input type="text"
                       id="username"
                       placeholder="Enter Username">
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email"
                       id="email"
                       placeholder="Enter Email">
            </div>

            <div class="input-group">
                <label>Role</label>
                <input type="text"
                       id="role"
                       readonly>
            </div>

            <div class="input-group">
                <label>Tenant ID</label>
                <input type="text"
                       id="tenantId"
                       readonly>
            </div>

            <div class="input-group">
                <label>Account Status</label>
                <input type="text"
                       id="status"
                       readonly>
            </div>

            <div class="input-group">
                <label>Last Login</label>
                <input type="text"
                       id="lastLogin"
                       readonly>
            </div>

        </div>

        <button class="primary-btn" id="updateProfileBtn">
            <i class="fa-solid fa-floppy-disk"></i>
            Update Profile
        </button>

    </div>

    <!-- ================= CHANGE PASSWORD ================= -->

    <div class="card">

        <div class="card-title">
            <i class="fa-solid fa-lock"></i>
            <h2>Change Password</h2>
        </div>

        <div class="form-grid">

            <div class="input-group">
                <label>Current Password</label>
                <input type="password"
                       id="currentPassword"
                       placeholder="Current Password">
            </div>

            <div class="input-group">
                <label>New Password</label>
                <input type="password"
                       id="newPassword"
                       placeholder="New Password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password"
                       id="confirmPassword"
                       placeholder="Confirm Password">
            </div>

        </div>

        <button class="primary-btn" id="changePasswordBtn">
            <i class="fa-solid fa-key"></i>
            Change Password
        </button>

    </div>

    <!-- ================= NOTIFICATIONS ================= -->

    <div class="card">

        <div class="card-title">
            <i class="fa-solid fa-bell"></i>
            <h2>Notification Preferences</h2>
        </div>

        <div class="toggle-box">

            <div class="toggle-item">
                <span>Email Notifications</span>

                <label class="switch">
                    <input type="checkbox" checked id="emailNotification">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-item">
                <span>New Applicant Alerts</span>

                <label class="switch">
                    <input type="checkbox" checked id="applicantNotification">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-item">
                <span>Job Expiry Reminder</span>

                <label class="switch">
                    <input type="checkbox" id="jobReminder">
                    <span class="slider"></span>
                </label>
            </div>

        </div>

    </div>

    <!-- ================= SUPPORT ================= -->

<div class="card">

    <div class="card-title">
        <i class="fa-solid fa-circle-info"></i>
        <h2>Help & Support</h2>
    </div>

    <div class="support-links">

        <a href="#" id="privacyPolicyLink">
            <i class="fa-solid fa-shield-halved"></i>
            Privacy Policy
        </a>

        <a href="#" id="termsConditionLink">
            <i class="fa-solid fa-file-contract"></i>
            Terms & Conditions
        </a>

        <a href="#" id="contactSupportLink">
            <i class="fa-solid fa-headset"></i>
            Contact Support
        </a>

    </div>

</div>

<!-- ================= LOGOUT ================= -->

<div class="logout-section">

    <button class="logout-btn" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
    </button>

</div>

</div>

<script src="setting.js"></script>

</body>
</html>
