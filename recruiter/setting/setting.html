<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings</title>

    <link rel="stylesheet" href="setting.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <div>

            <h1>
                <i class="fa-solid fa-gear"></i>
                Settings
            </h1>

            <p>Manage your recruiter account</p>

        </div>

        <button class="back-btn" onclick="history.back()">

            <i class="fa-solid fa-arrow-left"></i>
            Back

        </button>

    </header>

    <!-- Settings Cards -->

    <div class="settings-grid">

        <!-- Profile -->

        <div class="setting-card"
             onclick="window.location.href='../profile/profile.html'">

            <div class="icon">
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="content">
                <h3>Profile</h3>
                <p>View your recruiter profile</p>
            </div>

            <i class="fa-solid fa-angle-right arrow"></i>

        </div>

        <!-- Change Password -->

        <div class="setting-card"
             onclick="window.location.href='../changepassword/changepassword.html'">

            <div class="icon">
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="content">
                <h3>Change Password</h3>
                <p>Update your account password</p>
            </div>

            <i class="fa-solid fa-angle-right arrow"></i>

        </div>

        <!-- Notifications -->

        <div class="setting-card"
             onclick="window.location.href='../notification/notification.html'">

            <div class="icon">
                <i class="fa-solid fa-bell"></i>
            </div>

            <div class="content">
                <h3>Notifications</h3>
                <p>View recent notifications</p>
            </div>

            <i class="fa-solid fa-angle-right arrow"></i>

        </div>

        <!-- My Jobs -->

        <div class="setting-card"
             onclick="window.location.href='../my_jobs/myjobs.html'">

            <div class="icon">
                <i class="fa-solid fa-briefcase"></i>
            </div>

            <div class="content">
                <h3>My Jobs</h3>
                <p>Manage posted jobs</p>
            </div>

            <i class="fa-solid fa-angle-right arrow"></i>

        </div>

        <!-- Applicants -->

        <div class="setting-card"
             onclick="window.location.href='../applicants/applicants.html'">

            <div class="icon">
                <i class="fa-solid fa-users"></i>
            </div>

            <div class="content">
                <h3>Applicants</h3>
                <p>Manage job applicants</p>
            </div>

            <i class="fa-solid fa-angle-right arrow"></i>

        </div>

        <!-- Logout -->

        <div class="setting-card logout-card"
             onclick="logout()">

            <div class="icon">
                <i class="fa-solid fa-right-from-bracket"></i>
            </div>

            <div class="content">
                <h3>Logout</h3>
                <p>Sign out from your account</p>
            </div>

            <i class="fa-solid fa-angle-right arrow"></i>

        </div>

    </div>

</div>

<script src="setting.js"></script>

</body>

</html>
